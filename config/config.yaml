# =============================================================================
# Ultimate RAG — runtime configuration
# Non-secret structure lives here. Secrets/DSNs come from env (.env), prefix RAG_,
# nested keys delimited by "__" (e.g. RAG_LLM__API_KEY). Env overrides YAML.
# =============================================================================

app:
  name: "ultimate-rag"
  env: "dev"            # dev | staging | prod
  debug: true

logging:
  level: "DEBUG"            # our app.* loggers (received query, LLM prompt/messages/params, etc.)
  third_party_level: "WARNING"   # sqlalchemy / httpx / aiosqlite / etc. — raise to DEBUG to see them
  sql_echo: false          # SQLAlchemy engine SQL echo (very noisy)
  rich: true
  log_dir: "logs"
  file: "app.log"
  truncate: false
  preview_chars: 80        # max chars when previewing chunk/query/hash text in logs (0 = full preview)
  rotation_mb: 50
  backups: 5
  noisy_loggers: ["sqlalchemy", "sqlalchemy.engine", "aiosqlite", "httpcore", "httpx", "openai", "urllib3", "asyncio", "qdrant_client"]

observability:
  mlflow:
    enabled: false
    tracking_uri: "http://localhost:5000"
    experiment: "ultimate-rag"
    max_chunk_chars: 0    # chunk text length recorded in traces (0 = full, no truncation)
    autolog:
      langchain: true   # covers LangGraph
      openai: true
      litellm: false

api:
  host: "0.0.0.0"
  port: 8000
  cors_origins: ["*"]

# No auth layer. Callers pass user_id in the request payload (body field, multipart form
# field, or query param); every repository still filters on it for tenant isolation.
# Absent → user "default".

database:
  provider: "sqlite"               # postgres | sqlite
  # Postgres: relational + pgvector + AGE all in one DB.
  dsn: "postgresql+asyncpg://rag:rag@localhost:5432/rag"
  pool_size: 10
  max_overflow: 20
  # SQLite (provider: sqlite) — zero-infra relational store, file path below.
  # Note: pgvector and AGE are Postgres-only; pair sqlite with vector_store=chroma/qdrant.
  sqlite_path: "rag.db"

# --- Vector store -----------------------------------------------------------
vector_store:
  # Capability-aware: pgvector & chroma = semantic only; qdrant = semantic + BM25.
  # Requesting bm25/hybrid on a semantic-only store is rejected (no FTS fake-out).
  provider: "qdrant"                 # pgvector | qdrant | chroma
  collection: "rag_chunks"
  embedding_dim: 1024
  distance: "cosine"                 # cosine | dot | euclidean
  # qdrant
  qdrant_url: "http://localhost:6333"
  qdrant_api_key: null
  enable_sparse: true                # BM25/sparse vectors (Qdrant only)
  sparse_model: "Qdrant/bm25"        # fastembed model id
  # pgvector
  pgvector_table: "chunk_vectors"
  # chroma (local persistent, semantic only — zero infra)
  chroma_path: "chroma_data"

# --- Knowledge graph (Phase 2; scaffolded now) ------------------------------
graph_store:
  enabled: true
  provider: "networkx"               # age (needs Postgres) | networkx (local JSON files, zero infra)
  graph_name: "rag_kg"               # AGE only
  graph_dir: "graph_data"            # networkx: one JSON file per user under this dir

# --- Query cache ------------------------------------------------------------
cache:
  enabled: false
  provider: "ignite"                 # ignite | redis (later)
  ttl_seconds: 3600
  ignite_addresses: ["127.0.0.1:10800"]
  cache_name: "rag_query_cache"
  namespace: "qcache"

# --- Embeddings -------------------------------------------------------------
embeddings:
  provider: "ollama"           # azure_openai | openai | ollama
  model: "mxbai-embed-large:latest"  # no-NaN on Turing GPUs; 512-token limit handled by max_input_tokens
  dim: 1024
  batch_size: 64
  max_input_tokens: 300        # tiktoken cap; ~450-500 mxbai (SentencePiece) tokens < 512 limit. null for big-context models.
  # azure_openai — set the full deployment URL + key in .env (RAG_EMBEDDINGS__AZURE_URL, RAG_EMBEDDINGS__API_KEY)
  azure_url: null              # https://<res>.openai.azure.com/openai/deployments/<dep>/embeddings?api-version=2024-06-01
  azure_endpoint: null         # fallback if azure_url unset
  azure_deployment: null
  api_version: "2024-06-01"
  api_key: null                      # via env
  # ollama
  ollama_base_url: "http://localhost:11434"

# --- LLM --------------------------------------------------------------------
llm:
  provider: "ollama"                 # openai | ollama | vllm  (all OpenAI-compatible)
  model: "gemma3:4b"
  base_url: "http://localhost:11434/v1"  # OPENAI_BASE_URL env overrides (openai/vllm only)
  api_key: null                      # set OPENAI_API_KEY in env (used only when provider=openai)
  temperature: 0.1
  max_tokens: 1024
  timeout_s: 60
  max_retries: 3

# --- Reranker ---------------------------------------------------------------
reranker:
  enabled: false
  provider: "bge"                    # bge | qwen3 | cohere
  model: "BAAI/bge-reranker-v2-m3"
  top_n: 8
  endpoint: "http://localhost:8080"  # TEI endpoint (null = run locally)

# --- Document parsing -------------------------------------------------------
parsing:
  backend: "custom"                  # docling | custom
  docling:                           # any of these can be overridden per-request via parser_options
    url: "http://localhost:5001"     # docling-serve
    target_type: "inbody"            # inbody | zip
    to_formats: ["md"]               # md | json | yaml | html | text | doctags
    from_formats: null               # null = all input formats
    do_ocr: true
    force_ocr: false
    ocr_engine: "easyocr"            # auto | easyocr | tesseract | rapidocr | ocrmac | tesserocr
    ocr_lang: null                   # e.g. ["en"]; null = engine default
    pdf_backend: "dlparse_v2"        # pypdfium2 | dlparse_v1 | dlparse_v2 | dlparse_v4
    table_mode: "fast"               # fast | accurate
    table_cell_matching: true
    do_table_structure: true
    pipeline: "standard"             # standard | vlm | asr | legacy
    image_export_mode: "placeholder" # placeholder | embedded | referenced
    include_images: true
    images_scale: 2.0
    md_page_break_placeholder: ""    # e.g. "<!-- page-break -->"
    page_range: null                 # [start, end] 1-indexed; null = all pages
    document_timeout: null           # max seconds per document (null = server default)
    abort_on_error: false
    # Enrichment (each off by default — adds latency/model cost)
    do_code_enrichment: false
    do_formula_enrichment: false
    do_picture_classification: false
    do_chart_extraction: false
    do_picture_description: false
    picture_description_area_threshold: 0.05
    # Advanced VLM / picture-description models — JSON strings (see docling API examples); null = unused
    picture_description_local: null
    picture_description_api: null
    vlm_pipeline_model: null
    vlm_pipeline_model_local: null
    vlm_pipeline_model_api: null
  custom:
    ocr_engine: "rapidocr"           # rapidocr | tesseract
    ocr_languages: ["en"]
    pdf_image_ocr_threshold: 0.1     # text-density below which we OCR a page

# --- Chunking ---------------------------------------------------------------
chunking:
  strategy: "recursive"              # fixed | recursive | document_aware | semantic
  chunk_size: 300                    # tiktoken tokens; aligned with embeddings.max_input_tokens (mxbai 512 limit)
  chunk_overlap: 48
  unit: "token"                      # char | word | sentence | token
  semantic_threshold: 0.6            # only for semantic strategy

# --- Enrichment (all toggleable) --------------------------------------------
enrichment:
  image_captioning:
    enabled: false
    model: "gpt-4o"
  table_extraction:
    enabled: true
    summarize: true
  metadata_extraction:
    enabled: true                   # LLM-extracted metadata at ingest (core fields + free-form attributes)
    max_chars: 0                    # document text sent to the extractor (0 = whole document)
    attribute_hints: ["topics", "keywords"]   # common free-form attribute keys suggested to the extractor
  entity_extraction:               # graph entities + relations (only runs when graph_store.enabled)
    max_chunks: 0                  # chunks scanned for the graph (0 = all)
    max_chars: 0                   # chars per chunk sent to the extractor (0 = full chunk)
    embed_entities: true           # embed name+description so queries match entities semantically (not just by string)
    description_max_chars: 1000    # cap on an entity's merged (multi-mention) description
    summarize_descriptions: false  # LLM-collapse multi-source descriptions on merge (better quality, +cost)
  community_detection:             # Louvain communities + LLM reports → global/thematic queries (expensive)
    enabled: false                 # master switch for the community/global feature
    rebuild_on_ingest: false       # auto-rebuild after every ingest (small corpora); else POST .../graph/rebuild-communities
    min_community_size: 3          # skip communities smaller than this
    max_chars: 4000                # context budget per community-summary LLM call
  section_metadata:                # per-chunk (section-level) attributes — one LLM call per chunk
    enabled: false                 # off by default (expensive)
    max_chunks: 0                  # chunks to extract from (0 = all)
    max_chars: 0                   # chars per chunk sent to the extractor (0 = full chunk)
    attribute_hints: []            # common section keys, e.g. ["section", "clause", "price"]
  contextual_retrieval:
    enabled: false                   # prepend doc-level context to each chunk

# --- Retrieval --------------------------------------------------------------
retrieval:
  default_mode: "graph"             # semantic | bm25 | graph | hybrid | hybrid_graph | graph_global (thematic)
  top_k: 20
  fusion: "rrf"                      # rrf | weighted
  rrf_k: 60
  weights: { dense: 0.6, sparse: 0.4 }
  rerank_top_k: 8
  graph_hops: 1                      # graph mode: relation-edges traversed from matched entities (0 = direct mentions only)
  graph_query_entities: "regex"      # query seed entities: "regex" (cheap, no LLM) | "llm" (one extra call, better recall)
  graph_seed_top_k: 8                # entities used to seed local graph retrieval (semantic match, falls back to string)
  graph_dual_level: true             # local graph mode also blends the seed entities' community summaries (needs community_detection)
  graph_global_top_k: 8              # community summaries pulled in graph_global (thematic) mode

# --- Agent ------------------------------------------------------------------
agent:
  enabled: true
  style: "graph"                     # graph (fixed state-machine) | tools (ReAct tool-calling) | deep (deepagents: planner+subagents) — tools/deep need a strong LLM
  query_rewrite: true
  decompose: true
  max_subqueries: 4
  grade_relevance: true
  grade_max_chunks: 3                # chunks sent to the relevance grader (0 = all)
  max_retrieval_loops: 2
  context_exploration: false         # retrieve a few snippets first to ground rewrite/decompose
  context_exploration_top_k: 3
  tools:
    max_tool_calls: 8                # hard budget for the tools agent (prevents runaway loops)
  auto_filter:
    enabled: true                    # LLM infers metadata filters from the query (applies to /query and /chat)
    fields: ["doc_type", "language"] # core fields allowed as filters (categorical, normalized)
    use_catalog: true                # also allow discovered free-form attribute keys (per-tenant catalog)
    max_catalog_keys: 50             # cap attribute keys fed to the LLM

# --- Ingestion (in-process: background task or POST /ingest/sync) -----------
ingestion:
  max_file_mb: 100
  dedup_by_hash: true
  storage_dir: "uploads"           # POST /ingest/upload saves files under uploads/{user_id}/{version}/

# --- Chat sessions ----------------------------------------------------------
chat:
  memory_enabled: true
  max_turns: 20                    # turns of history loaded from chat_messages and fed to the agent
